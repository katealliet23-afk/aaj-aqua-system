<!DOCTYPE html>
<html>
<head>
    <title>QR Code Simple Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f5f5f5; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; }
        #qrContainer { width: 300px; height: 300px; border: 2px solid #ccc; margin: 20px auto; background: #fff; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .loading { background: #e3f2fd; color: #1976d2; }
        .success { background: #c8e6c9; color: #388e3c; }
        .error { background: #ffcdd2; color: #c62828; }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Code Test</h1>
        <div id="status" class="status loading">Loading...</div>
        <div id="qrContainer"></div>
        <p><strong>Test URL:</strong> <code>http://localhost/aaj-aqua-v3/aaj-aqua-v3/customer/order.php</code></p>
    </div>

    <script src="js/qrcode.min.js"></script>
    <script>
        const statusDiv = document.getElementById('status');
        const qrContainer = document.getElementById('qrContainer');
        
        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = 'status ' + type;
            console.log('[Test]', message);
        }
        
        try {
            updateStatus('Checking QRCode library...', 'loading');
            
            if (typeof QRCode === 'undefined') {
                throw new Error('QRCode library not found in global scope');
            }
            
            updateStatus('QRCode library found, generating QR code...', 'loading');
            
            const url = 'http://localhost/aaj-aqua-v3/aaj-aqua-v3/customer/order.php';
            
            new QRCode(qrContainer, {
                text: url,
                width: 300,
                height: 300,
                colorDark: '#0c4a6e',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
            
            updateStatus('✅ QR Code generated successfully!', 'success');
            
        } catch (e) {
            updateStatus('❌ Error: ' + e.message, 'error');
            console.error(e);
        }
    </script>
</body>
</html>
